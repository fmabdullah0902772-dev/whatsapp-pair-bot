<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WhatsApp Pair Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 10px;
    background: #22c55e;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.code {
    margin-top: 15px;
    font-size: 18px;
    color: yellow;
}
</style>
</head>

<body>

<div class="container">
    <h2>WhatsApp Pair</h2>

    <input type="text" id="number" placeholder="923xxxxxxxxx">

    <button onclick="startPair()">Generate Code</button>

    <div class="code" id="code">Code: -</div>
</div>

<script>
const API = "whatsapp-pair-bot-production.up.railway.app";

async function startPair() {
    let number = document.getElementById("number").value;

    await fetch(API + "/pair", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ number })
    });

    document.getElementById("code").innerText = "Generating...";
    
    setInterval(async () => {
        let res = await fetch(API + "/code");
        let data = await res.json();

        if (data.code) {
            document.getElementById("code").innerText = "Code: " + data.code;
        }
    }, 3000);
}
</script>

</body>
</html>
